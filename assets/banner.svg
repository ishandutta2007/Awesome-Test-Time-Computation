<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Drop Shadows and Glows -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Keyframe Animations for Dynamic Aspect -->
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -40;
        }
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .node-pulse-cyan {
        animation: pulse 4s ease-in-out infinite;
        transform-origin: 950px 150px;
      }
      .node-pulse-purple {
        animation: pulse 5s ease-in-out infinite;
        transform-origin: 1050px 250px;
      }
      .floating-group {
        animation: float 6s ease-in-out infinite;
      }
      .dash-flow {
        stroke-dasharray: 8, 12;
        animation: dash 2s linear infinite;
      }
      .spinning {
        animation: rotate 25s linear infinite;
        transform-origin: 1000px 200px;
      }
      .title-text {
        font-family: 'Outfit', 'Inter', system-ui, sans-serif;
        font-weight: 800;
        fill: #ffffff;
      }
      .sub-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 500;
        fill: #00f2fe;
        letter-spacing: 2px;
      }
      .desc-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 300;
        fill: #8a99ad;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Overlay for Tech Vibe -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" />
  </g>

  <!-- Decorative Abstract Geometric Shapes (Dynamic Speculative Tree/Graph in Background) -->
  <g class="spinning" opacity="0.25">
    <circle cx="1000" cy="200" r="120" fill="none" stroke="url(#accentCyan)" stroke-width="1.5" stroke-dasharray="10, 15" />
    <circle cx="1000" cy="200" r="160" fill="none" stroke="url(#accentPurple)" stroke-width="1" stroke-dasharray="5, 10" />
  </g>

  <!-- Active Reasoning/Compute Path Graph (Dynamic Aspect via Dash Flow) -->
  <g stroke-linecap="round">
    <!-- Connecting Edges -->
    <path d="M 850,200 L 950,150" stroke="#7000ff" stroke-width="2" opacity="0.6" />
    <path d="M 850,200 L 950,250" stroke="#00f2fe" stroke-width="2" opacity="0.6" />
    <path d="M 950,150 L 1050,120" stroke="#7000ff" stroke-width="2" opacity="0.6" />
    <path d="M 950,150 L 1050,180" stroke="#00f2fe" stroke-width="2" opacity="0.6" />
    <path d="M 950,250 L 1050,220" stroke="#7000ff" stroke-width="2" opacity="0.6" />
    <path d="M 950,250 L 1050,280" stroke="#00f2fe" stroke-width="2" opacity="0.6" />

    <!-- Flowing Particles -->
    <path d="M 850,200 L 950,150" stroke="url(#accentPurple)" stroke-width="2.5" class="dash-flow" />
    <path d="M 850,200 L 950,250" stroke="url(#accentCyan)" stroke-width="2.5" class="dash-flow" />
    <path d="M 950,150 L 1050,180" stroke="url(#accentCyan)" stroke-width="2.5" class="dash-flow" />
    <path d="M 950,250 L 1050,220" stroke="url(#accentPurple)" stroke-width="2.5" class="dash-flow" />

    <!-- Nodes -->
    <circle cx="850" cy="200" r="8" fill="#ffffff" filter="url(#glowCyan)" />
    
    <circle cx="950" cy="150" r="6" fill="#7000ff" filter="url(#glowPurple)" />
    <circle cx="950" cy="150" r="16" fill="none" stroke="#7000ff" stroke-width="1" class="node-pulse-purple" />
    
    <circle cx="950" cy="250" r="6" fill="#00f2fe" filter="url(#glowCyan)" />
    <circle cx="950" cy="250" r="16" fill="none" stroke="#00f2fe" stroke-width="1" class="node-pulse-cyan" />
    
    <circle cx="1050" cy="120" r="5" fill="#a5b4fc" />
    <circle cx="1050" cy="180" r="5" fill="#00f2fe" filter="url(#glowCyan)" />
    <circle cx="1050" cy="220" r="5" fill="#7000ff" filter="url(#glowPurple)" />
    <circle cx="1050" cy="280" r="5" fill="#a5b4fc" />
  </g>

  <!-- Left Side Text Content (Floating Group) -->
  <g class="floating-group">
    <!-- Sub-heading -->
    <text x="80" y="130" class="sub-text">INFERENCE-TIME COMPUTE SCALING</text>
    
    <!-- Main Title -->
    <text x="80" y="210" class="title-text" font-size="58px" filter="url(#glowCyan)">Test-Time Computation</text>
    <text x="80" y="210" class="title-text" font-size="58px">Test-Time Computation</text>

    <!-- Description -->
    <text x="80" y="260" class="desc-text" font-size="18px">An curated directory of search paradigms, algorithmic variants,</text>
    <text x="80" y="285" class="desc-text" font-size="18px">speculative verification, and native RL system-2 scaling.</text>
  </g>

  <!-- Tech Indicator Bar on Left Border -->
  <rect x="0" y="0" width="8" height="400" fill="url(#accentCyan)" filter="url(#glowCyan)" />
  <rect x="0" y="150" width="8" height="100" fill="url(#accentPurple)" filter="url(#glowPurple)" />
</svg>
